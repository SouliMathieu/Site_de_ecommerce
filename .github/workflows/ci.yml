name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build -w packages/shared

      - name: Generate Prisma client
        run: npm run prisma:generate -w apps/api

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test (api)
        run: npm run test -w apps/api

  build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build api image
        run: docker build -f apps/api/Dockerfile -t vente-intelligente-api:ci .

      - name: Build web image
        run: docker build -f apps/web/Dockerfile -t vente-intelligente-web:ci .
